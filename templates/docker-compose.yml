# Sample docker-compose.yml for one Hermes marketing agent.
# One file per agent on the VM. Volume names should encode company + agent
# so multiple agents on the same VM don't collide.
#
# Usage:
#   cp templates/docker-compose.yml /opt/agents/<company>-marketing/docker-compose.yml
#   # edit container_name + the volume host path below
#   docker compose up -d
#
# Layout matches the existing nousresearch/hermes-agent convention:
#   - HERMES_HOME inside the container is /opt/data (set in the base image).
#   - Host volume conventionally lives at ~/.hermes-agent-<name>/ to match
#     other agents on the same VM.
services:
  marketing-agent:
    image: restaurant-marketing:v4-alpha
    container_name: marketing-agent-CHANGE-ME
    restart: unless-stopped
    volumes:
      - HOST_DATA_DIR:/opt/data
    environment:
      - TZ=Europe/Stockholm
    # `gateway run` starts the Telegram gateway daemon (long-lived
    # listener). Hermes's entrypoint forwards args, so our pre-start
    # script forwards the same — see scripts/docker-entrypoint.sh.
    command: ["gateway", "run"]
    # No published ports: agent is outbound-only (Telegram + Composio MCP).
